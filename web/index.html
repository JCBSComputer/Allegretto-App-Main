<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="description" content="Allegretto Eisteddfod - The official platform for entries, syllabus information, and performance dates. Participate in music, drama, and dance.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Allegretto">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Allegretto Eisteddfod | Official Web Platform</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preload critical assets -->
  <link rel="preload" href="favicon.png" as="image">
  <link rel="preload" href="flutter_bootstrap.js" as="script">

  <style>
    html, body {
      background-color: #121212;
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    #loading-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }
    .splash-logo {
      width: 96px;
      height: 96px;
      margin-bottom: 24px;
      opacity: 0.9;
    }
    .splash-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #e0e0e0;
      margin-bottom: 4px;
    }
    .splash-subtitle {
      font-size: 11px;
      letter-spacing: 3px;
      color: #757575;
      margin-bottom: 32px;
      text-transform: uppercase;
    }
    .loader {
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 50%;
      border-top: 2px solid #D32F2F;
      width: 24px;
      height: 24px;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #seo-content {
      position: absolute;
      left: -9999px;
      visibility: hidden;
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <svg class="splash-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="46" stroke="#D32F2F" stroke-width="3" fill="none" opacity="0.3"/>
      <text x="50" y="62" text-anchor="middle" fill="#D32F2F" font-size="36" font-weight="bold" font-family="serif">A</text>
      <path d="M20 72 L50 88 L80 72" stroke="#D32F2F" stroke-width="1.5" fill="none" opacity="0.5"/>
    </svg>
    <div class="splash-title">Allegretto</div>
    <div class="splash-subtitle">Eisteddfod</div>
    <div class="loader"></div>
  </div>

  <div id="seo-content">
    <h1>Allegretto Eisteddfod Official Web Platform</h1>
    <p>Official portal for Music, Drama, Dance and Visual Arts entries and syllabus across South Africa.</p>
  </div>

  <!-- AdSense - deferred to avoid blocking render -->
  <script defer src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5878584013742794" crossorigin="anonymous"></script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
